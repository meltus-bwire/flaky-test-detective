name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          python-version: "3.14"
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run ty check src/
      - run: uv run pytest -q
      - name: Demonstrate the planted shared-state flake
        run: >-
          uv run pytest -p no:randomly
          fixtures/flaky-repo/test_shared.py::test_b_adds_a_shared_item
          fixtures/flaky-repo/test_shared.py::test_a_starts_with_no_shared_items
          -q
